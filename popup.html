<!DOCTYPE html>
<html>
<head>
<style>
  body {
    width: 260px;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: #333;
    margin: 0;
  }
  h1 {
    font-size: 15px;
    margin: 0 0 10px 0;
    line-height: 1.3;
  }
  .counter {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-bottom: 10px;
  }
  .counter strong {
    color: #e74c3c;
    font-size: 14px;
  }
  .divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 10px 0;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .toggle-label {
    font-size: 13px;
    color: #555;
  }
  .switch {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #ccc;
    transition: 0.2s;
    border-radius: 24px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: 0.2s;
    border-radius: 50%;
  }
  input:checked + .slider {
    background-color: #e74c3c;
  }
  input:checked + .slider:before {
    transform: translateX(20px);
  }
  .site-btn {
    display: block;
    width: 100%;
    padding: 8px;
    font-size: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fafafa;
    color: #555;
    cursor: pointer;
    text-align: center;
    margin-top: 10px;
    box-sizing: border-box;
  }
  .site-btn:hover {
    background: #f0f0f0;
  }
  .site-btn.blocked {
    background: #fff5f5;
    border-color: #e74c3c;
    color: #e74c3c;
  }
</style>
</head>
<body>
  <h1>AI to Glorified Autocomplete</h1>

  <div class="counter">
    <strong id="count">0</strong> replacements on this page
  </div>

  <hr class="divider">

  <div class="toggle-row">
    <span class="toggle-label">Enabled</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">Highlight changes</span>
    <label class="switch">
      <input type="checkbox" id="highlight">
      <span class="slider"></span>
    </label>
  </div>

  <button class="site-btn" id="site-toggle">Disable on this site</button>

  <script src="popup.js"></script>
</body>
</html>
